rs while dealing with sensitive data in M365 Copilot", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-12-09T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 107, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=a6a612ca-29d5-f011-8544-6045bda91a4a"}, {"featureRequestId": "MFR-M365-36447", "unifiedFeatureRequestId": "UI-FR-049407", "source": "CRM", "title": "M365 | Ability to turn off DLP for Copilot Prompt options in MAC", "description": "Customers want Purview capabilities to stay in Purview, they do not want users in MAC to be able to turn on or scope DLP for Copilot prompt policies", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-12-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 105, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=6cafe19b-25d6-f011-8544-6045bdd632b3"}, {"featureRequestId": "MFR-M365-36591", "unifiedFeatureRequestId": "UI-FR-049431", "source": "CRM", "title": "M365 | Copilot prompt DLP to support Advanced Classifiers (including EDM, Trainable Classifiers, Named Entities, etc.)", "description": "If a user types sensitive information containing an Advanced Classifier (EDM, Trainable Classifiers, Named Entities, etc.) into Copilot chat, it should be restricted by DLP. DLP rules should trigger and block the prompt response.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-12-18T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 98, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=f160aea1-acdb-f011-8543-6045bdef0457"}, {"featureRequestId": "MFR-M365-36268", "unifiedFeatureRequestId": "UI-FR-049516", "source": "CRM", "title": "Azure Copilot Support in Purview for AI", "description": "Microsoft Purview DSPM for AI, integrated with Microsoft Copilot in Azure, to ensure visibility and protection for Copilot in Azure.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-11-26T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 93, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=79452dc3-dcca-f011-8544-6045bda91a4a"}, {"featureRequestId": "MFR-M365-36739", "unifiedFeatureRequestId": "UI-FR-049389", "source": "CRM", "title": "Data Risk Assessments: Add Structured Data Sources to DSPM Oversharing Reports", "description": "Description: Enhance DSPM reporting by including structured data sources in oversharing analysis. This provides a more comprehensive view of data exposure risks across both structured and unstructured environments, improving security posture and compliance. Examples:Oversharing reports currently highlight files in unstructured storage but miss sensitive tables in databases; adding structured sources ensures full coverage.A compliance audit requires visibility into oversharing of structured data assets alongside existing unstructured data reports.Suggestions:Extend DSPM scanning capabilities to include structured data repositories such as databases and data warehouses.Provide unified reporting that aggregates oversharing insights across structured and unstructured sources for a holistic view.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-01-08T00:00:00+00:00", "createdBy": "Sunil Kadam", "featureAgeInDays": 91, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=18a90437-c3ec-f011-8406-7c1e5246de6f"}, {"featureRequestId": "MFR-M365-36737", "unifiedFeatureRequestId": "UI-FR-049394", "source": "CRM", "title": "M365 | Block with override for DLP for Copilot", "description": "DLP for Copilot currently supports only block actions. Customers are asking to expand to block with override since there are some instances where users may have legitimate business scenarios to override a block.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-01-08T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 77, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=dd8831ba-9eec-f011-8407-7c1e52817b02"}, {"featureRequestId": "MFR-M365-36745", "unifiedFeatureRequestId": "UI-FR-049481", "source": "CRM", "title": "M365 | \"NOT\" Condition Support in DLP for Copilot Policies", "description": "support for a \u201cNOT\u201d condition within DLP for Copilot policies to allow more granular rule logic. This capability is not blocking their deployment of Copilot or DLP for Copilot; rather, it is a nice\u2011to\u2011have enhancement that would improve policy flexibility but is not currently urgent.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-01-09T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 76, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=aee60d4a-f6ec-f011-8406-6045bda73f33"}, {"featureRequestId": "MFR-M365-36903", "unifiedFeatureRequestId": "UI-FR-049427", "source": "CRM", "title": "P4AI | Item-level data risk assessments to expand beyond 10 sites in the scope", "description": "Looking for item-level data risk assessment to allow you to scan more than the current 10 sites", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-01-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 70, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=00880d1d-85f8-f011-8406-7ced8d17ff64"}, {"featureRequestId": "MFR-M365-37056", "unifiedFeatureRequestId": "UI-FR-049438", "source": "CRM", "title": "P4AI | Native Integration to Push Purview Agent Activity Signals into Microsoft Sentinel", "description": "Purview AI Agent activity signals (e.g., agent interactions, actions taken, risk events, anomalies, model usage) to flow natively and automatically into Microsoft Sentinel without requiring custom pipelines or manual exports.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-02-04T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 69, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=6f34be3c-fc01-f111-8406-7ced8d1ca6c3"}, {"featureRequestId": "MFR-M365-36897", "unifiedFeatureRequestId": "UI-FR-049465", "source": "CRM", "title": "Purview for A365 | Bulk import of existing Agents into Agent 365 Registry", "description": "Customers with existing registries require a way to import existing agents into the Agent 365 agent registry at scale to enable migration and adoption.", "featureCategory": "Policy", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-01-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 66, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=30e0414b-66f8-f011-8406-6045bda73be3"}, {"featureRequestId": "MFR-M365-36874", "unifiedFeatureRequestId": "UI-FR-049547", "source": "CRM", "title": "P4AI | Data risk assessments scoped to include or exclude specific SITs", "description": "Want ability to scope data risk assessment to a specific set of SITs and/or exclude or hide certain SITs from the data risk assessment to make the report less noisy.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-01-22T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 60, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=8f93c8c5-bdf7-f011-8406-6045bdecf97a"}, {"featureRequestId": "MFR-M365-36963", "unifiedFeatureRequestId": "UI-FR-049480", "source": "CRM", "title": "M365 | Restrict the upload of file to copilot if it contains sensitive data (both OOB SITs as well as Custom SITs)", "description": "Customers need to enforce Microsoft Purview Data Loss Prevention (DLP) policies to block file upload actions in Microsoft 365 Copilot when the content contains sensitive information identified by either built-in or custom Sensitive Information Types (SITs). Today, customers lack a clear and consistent enforcement mechanism to prevent users from uploading files containing sensitive data into Copilot prompts, resulting in a gap between defined DLP policy conditions and Copilot workload enforcement. This limits customers\u2019 ability to apply existing DLP controls to Copilot interactions and ensure sensitive content is not introduced into AI-assisted workflows.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-01-29T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 56, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=b6e01256-39fd-f011-8406-7c1e52157f8b"}, {"featureRequestId": "MFR-M365-36875", "unifiedFeatureRequestId": "UI-FR-049478", "source": "CRM", "title": "P4AI | Item-level data risk assessments to take automated actions", "description": "Want automated notifications and actions for item-level assessment. For example, if a file contains sensitive information and is shared with everyone, automatically notify owner and if no action is taken within X# of days, remove the sharing link to help reduce the burden on data security admin.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-01-22T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 55, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=793dfa2d-bef7-f011-8406-6045bdecf97a"}, {"featureRequestId": "MFR-M365-36310", "unifiedFeatureRequestId": "UI-FR-049470", "source": "CRM", "title": "P4AI | Purview AI controls for Mistral AI", "description": "Customers want to detect and block AI usage within Mistral AI to prevent and/or block sensitive data exposure within this 3P AI SaaS app.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-12-01T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 53, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=84dfa03d-f1ce-f011-8544-7c1e526b516b"}, {"featureRequestId": "MFR-M365-37293", "unifiedFeatureRequestId": "UI-FR-049429", "source": "CRM", "title": "M365 | DLP for Copilot controls for cross-tenant content exposure", "description": "Customers are concerned that if a guest user has access to external-tenant content, Copilot can still reason over it, creating unintended data exposure across trust boundaries. Provide stronger DLP controls to limit Copilot reasoning over content that originates in another tenant, even when access is granted via cross-tenant collaboration.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 51, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=dd78d161-e610-f111-8342-7c1e52817b02"}, {"featureRequestId": "MFR-M365-37055", "unifiedFeatureRequestId": "UI-FR-049455", "source": "CRM", "title": "M365 | Prevent Copilot from processing text copied from labelled files", "description": "Customers are asking for a more granular control that stops Copilot from processing a prompt when the user pastes text originating from a sensitivity\u2011labelled file-without fully blocking copy/extract operations at the OS level. Today, the only native mechanism to prevent labelled content from being copied into an AI prompt is to use the Azure Rights Management \u201cCopy (Extract)\u201d permission within a label but this is highly restrictive and blocks all forms of copy/extract activity, not just the prompt submission.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-04T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 50, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=48c8dd88-fb01-f111-8406-7ced8d1ca6c3"}, {"featureRequestId": "MFR-M365-37053", "unifiedFeatureRequestId": "UI-FR-049527", "source": "CRM", "title": "M365 | Block processing of external emails to prevent XPIA (prompt injection) attacks", "description": "As part of the new feature we are developing to block processing of external emails to prevent XPIA prompt injection attacks, partners have requested that they can configure an 'Allow\" or exclusions from the policy for domain trusted partners.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": null, "priority": "P2", "createdDate": "2026-02-04T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 50, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=d7cb07f4-fa01-f111-8406-7ced8d1ca6c3"}, {"featureRequestId": "MFR-M365-37032", "unifiedFeatureRequestId": "UI-FR-049436", "source": "CRM", "title": "DSPM | Data risk assessments for Azure files", "description": "Enable Data Risk Assessments for Azure Files within Microsoft Purview DSPM to provide full visibility into sensitive data exposure, oversharing, and labeling quality across Azure Files repositories. Partners report that many enterprise customers-especially hybrid and regulated industries-store high\u2011value data in Azure Files, but DSPM cannot assess risk in these locations today so is a major visibility gap for hybrid estates.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-02-03T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 43, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=86148322-3601-f111-8407-7c1e52157f10"}, {"featureRequestId": "MFR-M365-37290", "unifiedFeatureRequestId": "UI-FR-049526", "source": "CRM", "title": "M365 | DLP for Copilot to support condition 'content is not labeled'", "description": "Many customers are early in their labeling journey and want to prevent Copilot access to unlabeled content by default. Today, the lack of an explicit \u201cnot labeled\u201d condition limits their ability to enforce governance-first adoption of Copilot.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 43, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=26df1aad-e510-f111-8342-7c1e52817b02"}, {"featureRequestId": "MFR-M365-37228", "unifiedFeatureRequestId": "UI-FR-049412", "source": "CRM", "title": "M365 | Add an Audit\u2011only mode for Copilot DLP policies that detects Sensitive Information Types (SITs) in user prompts and triggers alerts without blocking Copilot processing", "description": "Feature request: Add an Audit\u2011only mode for Copilot DLP policies that detects Sensitive Information Types (SITs) in user prompts and triggers alerts without blocking Copilot processing.Impact: Today Copilot DLP acts as a hard block when SITs are detected, which limits visibility and drives users to bypass controls. An audit\u2011only option would enable organizations to monitor and understand real prompt risk, collect signals for tuning policies, and reduce user friction while still surfacing actionable alerts for security teams. This improves adoption of Purview for AI, strengthens governance maturity, and provides lower\u2011risk onramp before enforcing restrictive actions.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-18T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 36, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=d3bca857-070d-f111-8407-7ced8d17ff64"}, {"featureRequestId": "MFR-M365-34646", "unifiedFeatureRequestId": "UI-FR-049507", "source": "CRM", "title": "AI Generated Sensitivity Labels in Purview", "description": "Customer would like to be able to label the content as \"AI generated\". Not the entire document (they are happy with Label Inheritance) but something along the lines of \"This content was generated from a confidential document.\" This will change the label of the document to \"Confidential\" and restrict access. Do you want to proceed?\" Similar to DLP Tips but for AI generated content.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-05-28T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 33, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=f40826b1-ff3b-f011-b4cc-6045bda7d206"}, {"featureRequestId": "MFR-M365-37289", "unifiedFeatureRequestId": "UI-FR-049392", "source": "CRM", "title": "M365 | DLP for Copilot to support condition 'file extension / file type is'", "description": "Customers frequently work with file formats (notably AutoCAD) that cannot be reliably scanned or labeled. Customers want to explicitly block Copilot from processing these high-risk formats.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 31, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=90617b75-e510-f111-8342-7c1e52817b02"}, {"featureRequestId": "MFR-M365-37291", "unifiedFeatureRequestId": "UI-FR-049512", "source": "CRM", "title": "M365 | DLP for Copilot to support condition 'document could not be scanned'", "description": "Unscannable or failed-scan content is often treated by customers as implicitly high risk, yet today cannot be reliably gated in Copilot workflows.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 31, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=a8b651e1-e510-f111-8342-7c1e52817b02"}, {"featureRequestId": "MFR-M365-38268", "unifiedFeatureRequestId": "UI-FR-049484", "source": "CRM", "title": "Minimize the application permissions required to perform item-level remediation", "description": "Minimize the application permissions required to perform item-level remediation", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-23T00:00:00+00:00", "createdBy": "Jenny Li", "featureAgeInDays": 29, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=b8e89092-bf26-f111-88b4-7c1e5246de6f"}, {"featureRequestId": "MFR-M365-37295", "unifiedFeatureRequestId": "UI-FR-049543", "source": "CRM", "title": "P4AI | Data risk assessment | Distinguish label-eligible vs non-eligible file types in risk assessment", "description": "Certain file types do not support sensitivity labeling or classification at rest. Including these files inflates unlabeled counts and creates a false perception of widespread oversharing or governance failure.Update the data risk assessment experience to distinguish label\u2011eligible file types from non\u2011label\u2011eligible formats (e.g., CAD files) and exclude unsupported formats from \u201cunlabeled files\u201d counts.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-02-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 29, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=31ab6208-e710-f111-8342-7c1e52817b02"}, {"featureRequestId": "MFR-M365-37365", "unifiedFeatureRequestId": "UI-FR-049461", "source": "CRM", "title": "M365 | DLP for Copilot to support condition 'Document property is / contains' condition", "description": "law firm clients that store customer identifiers (e.g. Client ID, Matter ID, Case Number) exclusively in document metadata. This is a common and intentional practice in the legal sector to tag documents with customer-specific identifiers that do not appear in the file body and therefore are not detectable by standard SITs. The ask is to extend DLP for Copilot with a \u2018Document property is / contains\u2019 condition, allowing admins to block Copilot from processing prompts when referenced files include specific metadata values. This is required for legal-sector rollouts, where document sensitivity is defined by metadata context rather than in-content signals.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-26T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 28, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=d49d0623-3513-f111-8342-7c1e52817aa2"}, {"featureRequestId": "MFR-M365-37362", "unifiedFeatureRequestId": "UI-FR-049522", "source": "CRM", "title": "M365 | Upload file to Copilot - bypass security policy (ex Edlp)", "description": "When a user upload a file in copilot, this create a copy of the file in a folder in onedrive. This process bypass blockers customer can have to avoid for user to being able to upload specific file in onedrive (ex Edlp policy > content cointeins sensitivity labels >block upload to ondrive)When a user uploads a file to Microsoft 365 Copilot, a copy of the file is created in OneDrive as part of the Copilot processing flow. This upload path isn\u2019t governed by traditional OneDrive or Endpoint DLP upload blockers. To prevent sensitive files from being used, customers must use Copilot\u2011specific DLP controls or disable Copilot file upload.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-26T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 28, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=b775d3af-db12-f111-8342-6045bdecf51b"}, {"featureRequestId": "MFR-M365-37594", "unifiedFeatureRequestId": "UI-FR-049542", "source": "CRM", "title": "DSPM AI Observability | Add meaningful agent context in AI observability", "description": "The agent name alone is insufficient at scale. Two agents with similar names can have radically different risk profiles. The same agent name can mean different things across teams, tenants, or business units. Without standardized agent descriptions/use cases, risk signals become harder to interpret and triage across tens of thousands of agents, undermining policy decisions and trust in the platform.Introduce a minimal \u201cagent registration\u201d expectation (use case, data sources, risk profile) and align it to workflows like monitoring, attestation, and recommendations so governance is actionable - not just visible", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2026-03-12T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 27, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=f6f5fe0f-dc1d-f111-8342-6045bdecfc3f"}, {"featureRequestId": "MFR-M365-37428", "unifiedFeatureRequestId": "UI-FR-049529", "source": "CRM", "title": "Purview for A365 | DSPM AI Observability ('Within AI risk' switch from \"No Data Available\" to \"No Risk Detected\")", "description": "Description: Customers would like to see \u201cNo risk detected\u201d vs. \u201cNo Data Available\u201d in the \u201cWithin AI risk\u201d section of the AI Observability page. \"No Data Available\" - \"makes me think that there is something broken. That there are issues with my pipeline.\" - DOW", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2026-03-04T00:00:00+00:00", "createdBy": "Sophia Qureshi", "featureAgeInDays": 26, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=05337f35-eb17-f111-8341-7ced8d2159c6"}, {"featureRequestId": "MFR-M365-37294", "unifiedFeatureRequestId": "UI-FR-049462", "source": "CRM", "title": "P4AI | Data risk assessment | Preserve 'last modified' metadata during automated labeling", "description": "Provide an option to preserve or update the \u201clast modified\u201d timestamp when a sensitivity label is applied as part of an automated remediation or auto\u2011labeling workflow. Automatically updating the \u201clast modified\u201d field can unintentionally impact downstream controls such as retention, disposition, and audit policies that rely on this metadata. Today, admins have no control over this behavior when labels are applied automatically.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-02-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 23, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=8aa565ca-e610-f111-8342-7c1e52817b02"}, {"featureRequestId": "MFR-M365-37435", "unifiedFeatureRequestId": "UI-FR-049432", "source": "CRM", "title": "M365 | DLP for Copilot to surface sensitivity label meta data in DLP rule match", "description": "For DLP for Copilot, when a DLP rule matches based on a sensitivity label, the label itself is not surfaced as a parameter in Activity Explorer for the resulting DLP event.This is inconsistent with:Other DLP workloads, where label metadata is visibleSIT\u2011based DLP for Copilot, where matched SIT details are surfaced Customers want to surface sensitivity label metadata (e.g., label name/ID) in Activity Explorer for DLP for Copilot events when the rule match is label\u2011based", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-04T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 22, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=d96afae3-1718-f111-8342-6045bdd45021"}, {"featureRequestId": "MFR-M365-37426", "unifiedFeatureRequestId": "UI-FR-049557", "source": "CRM", "title": "M365 | Default label Copilot generated content", "description": "AI\u2011generated content is enterprise data the moment it is created. If Copilot outputs are written to OneDrive or SharePoint without mandatory sensitivity labels and visible classification markers, unclassified data can persist until downstream controls act-creating regulatory and governance gaps. Relying on post\u2011creation enforcement is insufficient in regulated environments where classification is required at the point of creation. Mandatory pre\u2011write labeling ensures consistent data protection, auditability, and regulatory alignment across all Copilot content flows. This collides with the regulatory obligations of our customers.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-04T00:00:00+00:00", "createdBy": "Nadia Fortini", "featureAgeInDays": 22, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=47d7c00a-da17-f111-8342-7c1e52021284"}, {"featureRequestId": "MFR-M365-37252", "unifiedFeatureRequestId": "UI-FR-049421", "source": "CRM", "title": "Support to enforce DLP policies on selected AI applications and agents within Microsoft Foundry", "description": "Support to enforce DLP policies on selected AI applications and agents within Microsoft Foundry", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-02-20T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 21, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=62450837-3a0e-f111-8406-7ced8d2159c6"}, {"featureRequestId": "MFR-M365-37609", "unifiedFeatureRequestId": "UI-FR-049444", "source": "CRM", "title": "M365 | Remove workaround options in Copilot response when user does not have extract rights", "description": "When a user tries to summarize a file in Copilot and they don't have the correct permissions, like extract rights, then it tells the user how to get around it. Like copy and pasting the contents of the file into copilot instead. Customers would like to be able to remove this part of Copilot's response.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-13T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 13, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=9be2a9f7-741e-f111-8342-7c1e521995b5"}, {"featureRequestId": "MFR-M365-38399", "unifiedFeatureRequestId": "UI-FR-049398", "source": "CRM", "title": "DLP: OCR usage and billing report", "description": "Customer facing dashboard that give them insights on Report should reflect which files/images are being scanned by OCR, how many files/images are scanned, what file/image types are scanned vs skipped, and the volume of OCR activity contributing to billing.Reports should support filter by workloads, file type, file size, date/time.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-29T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 12, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=db3cd620-3b2b-f111-88b5-7ced8d17ff64"}, {"featureRequestId": "MFR-M365-38276", "unifiedFeatureRequestId": "UI-FR-049554", "source": "CRM", "title": "Capability to run custom data risk assessment scan based on site level labels", "description": "Capability to run custom data risk assessment scan based on site level labels", "featureCategory": "DRA-M365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 9, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=0a817734-c326-f111-88b4-7c1e5246de6f"}, {"featureRequestId": "MFR-M365-38606", "unifiedFeatureRequestId": "UI-FR-049540", "source": "CRM", "title": "Purview for A365 | Monitoring, Reporting and Data Interpretation - Purview Audit Analytics", "description": "DSPM screens show difficulty in interpreting which environments or agents are relevant for monitoring and audit action due to the proliferation of Agents and Apps and therefore associated volumes of data from many environments and sources.[HIGH]Potential Solution: Add columns or filters in Purview Analytics and Audit screen and reports to distinguish between dev, test, and production environments, and between Solution types such as Foundry / Studio / Fabric Agents and Apps.[Microsoft] DPSM Audit screens display \u201cRisky events\u201d based on Microsoft algorithms and view on what constitutes Risk alone. [HIGH]Potential Solution: Allow customer to inject Risk Parameters such as those related to usage region (e.g. Germany for Works Council), Business Function (e.g. Finance for Highly Confidential data use agents) related or even the people using it. (e.g. ST&S Must-record-list users for Compliance)[Microsoft]Need for clear reporting to divide up costs and usage by business unit, subscription, or region.", "featureCategory": "A365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-04-08T00:00:00+00:00", "createdBy": "Min Zhou", "featureAgeInDays": 9, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=49a4751d-2133-f111-88b5-7c1e52817b02"}, {"featureRequestId": "MFR-M365-38712", "unifiedFeatureRequestId": "UI-FR-049439", "source": "CRM", "title": "DLP for Copilot: Restrict Copilot from processing external domain emails completely", "description": "There are legal firms who have signed contracts with their clients and some of them have clauses to not process their data/interactions using AI. They are also in discussion for Copilot rollout however this constraint in the contract is limiting them from proceeding further. They are at risk of client data processing with AI specifically emails. DLP for Copilot restricts emails processing based on sensitivity labels but only applicable on emails later than 1 Jan 2025.DLP for Copilot for external emails in private preview today doesn't cater for external user as recipient.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Preview Release", "priority": "P2", "createdDate": "2026-04-15T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 6, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=6e9a17b2-df38-f111-88b5-6045bdecf97a"}, {"featureRequestId": "MFR-M365-38375", "unifiedFeatureRequestId": "UI-FR-049390", "source": "CRM", "title": "M365 | Web Grounding DLP: Support for Customized end user notifications", "description": "Customers would like to be able to customize end user notifications in web grounding DLP as they are not sure if end users would understand what this means. They would also like hyperlink support to link to an internal article.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-03-27T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 5, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=b772d67f-e029-f111-88b5-7c1e521995b5"}, {"featureRequestId": "MFR-M365-38536", "unifiedFeatureRequestId": "UI-FR-049546", "source": "CRM", "title": "DSPM AI Observability | Map Agent risk to corresponding AI interactions in DSPM", "description": "Summary - Data Security Investigations flow relating to agents' risk has low usability where an identified risk (for example - oversharing) is not directly mapped into corresponding AI Interactions. 'Viewing all activities' shows hundreds of activities with no mapping to ones related to the risk (such as oversharing).Repro: In DSPM observability it shows risk per agent, like here 7 oversharing that contributed to high risk Now customers want to see the \"7\" oversharing instances.. they cant click on the 7 to drill down but they can click on \"view all activities\". This gives them hundreds of AI interactions and doesn't help them find which ones are connected to the 7 oversharing.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-04-03T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 3, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=bae5e1f5-802f-f111-88b5-7c1e5248e93b"}, {"featureRequestId": "MFR-M365-38661", "unifiedFeatureRequestId": "UI-FR-048543", "source": "CRM", "title": "DSPM | Display SIT match details in Data Risk Assessment dashboard", "description": "CX-need: Expose Sensitive Information Types (SITs) alongside sensitivity labels in item-level Data Risk Assessment results within the Purview DSPM portal so customers can validate why files are assessed as high risk. Description:Customer has requested than viewing the Item Level assessments in the DPSM Purview portal, that the SITS identified on the files should also be visible along with the label.Customer Scenario:Customer wish to run to assessments against sensitive data but are unable to validate if the files are high risk", "featureCategory": "DRA-M365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Pending Triage", "priority": "P2", "createdDate": "2026-04-13T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 3, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=309fea3a-7737-f111-88b4-6045bda73be3"}, {"featureRequestId": "MFR-M365-38608", "unifiedFeatureRequestId": "UI-FR-049468", "source": "CRM", "title": "Purview for A365 | Test and Red teaming sensitive identification", "description": "DSPM Audit capability does not distinguish between Red Team limit or edge case testing events and \u201creal\u201d Risk based events. Compliance Alerts and Alert process will triggered automatically.[HIGH] Potential Solution: Allow the ability to differentiate between \u201creal\u201d and Red Team testing events or provide a secure audit toggle for Agents/Apps at alert policy level.[Microsoft] Requirement to flag events where agents bypass guardrails or share sensitive information, without capturing actual data.[HIGH]Potential Solution: Configure generic policies to capture such events and integrate with AI governance dashboards. [Microsoft + BP]", "featureCategory": "A365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-04-08T00:00:00+00:00", "createdBy": "Min Zhou", "featureAgeInDays": 2, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=73db0989-2133-f111-88b5-7c1e52817b02"}, {"featureRequestId": "MFR-M365-38604", "unifiedFeatureRequestId": "UI-FR-049550", "source": "CRM", "title": "Purview for A365 | Granular monitoring and Policy controls for A365", "description": "Difficulty in distinguishing between dev, test, and production environments for Copilot Studio agents; all environments are monitored tenant-wide, making it hard to filter relevant data.How it applies to purview is they Lack of ability to apply DLP and other policies at a more granular level (e.g., specific agents/apps rather than blanket policies across all agents).", "featureCategory": "A365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-04-08T00:00:00+00:00", "createdBy": "Min Zhou", "featureAgeInDays": 1, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=ca2e0740-1e33-f111-88b5-7c1e52817b02"}, {"featureRequestId": "MFR-M365-38630", "unifiedFeatureRequestId": "UI-FR-049553", "source": "CRM", "title": "Purview for A365 | Extended AI Activity Log Retention (30 days \u2192 90-180 days)", "description": "Extended AI Interaction Log Retention (30 days \u2192 90-180 days)", "featureCategory": "A365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2026-04-09T00:00:00+00:00", "createdBy": "Min Zhou", "featureAgeInDays": 1, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=4a95b0e2-0e34-f111-88b5-7c1e52817b02"}, {"featureRequestId": "MFR-M365-38605", "unifiedFeatureRequestId": "UI-FR-049408", "source": "CRM", "title": "Purview for A365 | Billing and Cost Attribution Challenges for Foundry and Fabric Agents and capability", "description": "Purview pay-as-you-go billing is centralized, providing an OPEX challenge for Digital Workplace who own the platform costs, and making it difficult to recharge costs to individual business units or subscriptions - even retrospectively.Ambiguity in splitting costs for widely used services like Power BI Copilot and Copilot Studio, which are included in E5 licenses and used across the enterprise. [CRITICAL] Potential Solution: Create a Pay-as-you-go solution for all Purview billing at a more granular level. e.g. per Subscription (Foundry/Copilot Studio) and Workspace (Fabric) [Microsoft] Potential Solution: Provide better granular metrics or reporting per Agent to track usage and costs per business unit or subscription. [Microsoft]Potential Solution: Force Developers to add custom properties to their Code and entities then build custom Power BI reports to track usage and costs per business unit or subscription. [BP - High effort > very hard to achieve and enforce in practice. May cover Foundry Agents and Apps but not Fabric Workspaces]Potential Solution: Use admin units in Purview let filteredData = [...RAW_DATA];
let sortCol = 'createdDate';
let sortDir = -1;

function getStatusBadge(status) {
  if (!status) return '<span class="badge badge-default">N/A</span>';
  const map = {
    'Evidence Gathering': 'evidence',
    'In Development': 'development',
    'In Development - Current Semester': 'development',
    'In Development - Multi-semester': 'development',
    'Pending Triage': 'triage',
    'In Engineering Backlog': 'backlog',
    'In Preview Release': 'preview',
  };
  const cls = map[status] || 'default';
  return '<span class="badge badge-' + cls + '">' + status + '</span>';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function updateStats() {
  const bar = document.getElementById('statsBar');
  const statuses = {};
  filteredData.forEach(function(r) {
    const s = r.customerFacingStatus || 'N/A';
    statuses[s] = (statuses[s] || 0) + 1;
  });
  const colors = {
    'Evidence Gathering': '#835c00',
    'In Development': '#107c10',
    'Pending Triage': '#4a4a8a',
    'In Engineering Backlog': '#004578',
    'In Preview Release': '#0b6a0b',
  };
  var html = '<div class="stat-card"><div class="num">' + filteredData.length + '</div><div class="label">Total</div></div>';
  var entries = Object.entries(statuses).sort(function(a,b) { return b[1]-a[1]; });
  entries.forEach(function(e) {
    html += '<div class="stat-card"><div class="num" style="color:' + (colors[e[0]]||'#666') + '">' + e[1] + '</div><div class="label">' + e[0] + '</div></div>';
  });
  bar.innerHTML = html;
}

function populateFilters() {
  var statuses = [...new Set(RAW_DATA.map(function(r) { return r.customerFacingStatus; }).filter(Boolean))].sort();
  var sources = [...new Set(RAW_DATA.map(function(r) { return r.source; }).filter(Boolean))].sort();
  var priorities = [...new Set(RAW_DATA.map(function(r) { return r.priority; }).filter(Boolean))].sort();
  
  var sf = document.getElementById('statusFilter');
  statuses.forEach(function(s) { var o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o); });
  var sof = document.getElementById('sourceFilter');
  sources.forEach(function(s) { var o = document.createElement('option'); o.value = s; o.textContent = s; sof.appendChild(o); });
  var pf = document.getElementById('priorityFilter');
  priorities.forEach(function(s) { var o = document.createElement('option'); o.value = s; o.textContent = s; pf.appendChild(o); });
}

function applyFilters() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var status = document.getElementById('statusFilter').value;
  var source = document.getElementById('sourceFilter').value;
  var priority = document.getElementById('priorityFilter').value;
  
  filteredData = RAW_DATA.filter(function(r) {
    if (status && r.customerFacingStatus !== status) return false;
    if (source && r.source !== source) return false;
    if (priority && r.priority !== priority) return false;
    if (search) {
      var hay = [r.title, r.description, r.featureRequestId, r.unifiedFeatureRequestId, r.createdBy]
        .filter(Boolean).join(' ').toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    return true;
  });
  
  sortData();
  render();
}

function sortData() {
  filteredData.sort(function(a, b) {
    var va = a[sortCol], vb = b[sortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    var th = document.querySelector('th[data-col="' + sortCol + '"]');
    var type = th ? th.dataset.type : 'string';
    if (type === 'number') return (Number(va) - Number(vb)) * sortDir;
    if (type === 'date') return (new Date(va || 0) - new Date(vb || 0)) * sortDir;
    return String(va).localeCompare(String(vb)) * sortDir;
  });
}

function render() {
  updateStats();
  var tbody = document.getElementById('tableBody');
  var noRes = document.getElementById('noResults');
  document.getElementById('resultsInfo').textContent = 'Showing ' + filteredData.length + ' of ' + RAW_DATA.length + ' feature requests';
  
  if (filteredData.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';
  
  tbody.innerHTML = filteredData.map(function(r) {
    var titleHtml = r.url ? '<a href="' + escapeHtml(r.url) + '" target="_blank">' + escapeHtml(r.title) + '</a>' : escapeHtml(r.title);
    return '<tr>' +
      '<td class="id-cell">' + escapeHtml(r.featureRequestId) + '</td>' +
      '<td class="title-cell">' + titleHtml + '</td>' +
      '<td class="desc-cell" title="' + escapeHtml(r.description) + '">' + escapeHtml(r.description) + '</td>' +
      '<td>' + getStatusBadge(r.customerFacingStatus) + '</td>' +
      '<td><span class="priority-badge priority-' + (r.priority || '') + '">' + (r.priority || '—') + '</span></td>' +
      '<td><span class="source-badge source-' + (r.source || '') + '">' + (r.source || '—') + '</span></td>' +
      '<td style="font-size:12px">' + (escapeHtml(r.createdBy) || '—') + '</td>' +
      '<td class="date-cell">' + formatDate(r.createdDate) + '</td>' +
      '<td class="age-cell">' + (r.featureAgeInDays != null ? r.featureAgeInDays + 'd' : '—') + '</td>' +
      '</tr>';
  }).join('');
  
  document.querySelectorAll('th').forEach(function(th) {
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    var icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = th.dataset.col === sortCol ? (sortDir === 1 ? '▲' : '▼') : '⇅';
  });
}

document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    sortData();
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);
document.getElementById('sourceFilter').addEventListener('change', applyFilters);
document.getElementById('priorityFilter').addEventListener('change', applyFilters);

function exportCSV() {
  var headers = ['Feature Request ID','Unified ID','Source','Title','Description','Status','Priority','Created By','Created Date','Age (days)','URL'];
  var rows = filteredData.map(function(r) {
    return [
      r.featureRequestId, r.unifiedFeatureRequestId, r.source,
      '"' + (r.title||'').replace(/"/g,'""') + '"', '"' + (r.description||'').replace(/"/g,'""') + '"',
      r.customerFacingStatus, r.priority, r.createdBy, r.createdDate, r.featureAgeInDays, r.url
    ].join(',');
  });
  var csv = headers.join(',') + '\n' + rows.join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'purview_for_ai_feature_requests.csv';
  a.click();
}

populateFilters();
applyFilters();
</script>
