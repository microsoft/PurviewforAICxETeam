<style>
  :root {
    --primary: #0078d4;
    --primary-dark: #005a9e;
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #323130;
    --text-light: #605e5c;
    --border: #edebe9;
    --green: #107c10;
    --blue: #0078d4;
    --orange: #ca5010;
    --red: #d13438;
    --purple: #8764b8;
    --teal: #038387;
    --yellow: #ffaa44;
    --gray: #8a8886;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  
  .header {
    background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
    color: white; padding: 24px 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header h1 { font-size: 24px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  
  .stats-bar {
    display: flex; gap: 16px; padding: 16px 32px; background: white;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .stat-card {
    background: var(--bg); border-radius: 8px; padding: 12px 20px;
    min-width: 120px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--primary); }
  .stat-card .label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  
  .controls {
    display: flex; gap: 12px; padding: 16px 32px; flex-wrap: wrap; align-items: center;
    background: white; border-bottom: 1px solid var(--border);
  }
  .search-box {
    flex: 1; min-width: 250px; position: relative;
  }
  .search-box input {
    width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--primary); }
  .search-box::before {
    content: "\1F50D"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 14px;
  }
  select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; background: white; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--primary); }
  
  .results-info {
    padding: 8px 32px; font-size: 12px; color: var(--text-light); background: white;
    border-bottom: 1px solid var(--border);
  }
  
  .table-container {
    padding: 0 32px 32px; margin-top: 8px; overflow-x: auto;
  }
  table {
    width: 100%; border-collapse: collapse; background: white;
    border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  th {
    background: #faf9f8; padding: 10px 14px; text-align: left;
    font-size: 12px; font-weight: 600; color: var(--text-light);
    text-transform: uppercase; letter-spacing: 0.3px;
    border-bottom: 2px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; position: sticky; top: 0; z-index: 10;
  }
  th:hover { background: #f3f2f1; }
  th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; color: var(--primary); }
  td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: top;
  }
  tr:hover td { background: #f5f5f5; }
  
  .title-cell { max-width: 350px; }
  .title-cell a {
    color: var(--primary); text-decoration: none; font-weight: 500;
  }
  .title-cell a:hover { text-decoration: underline; }
  
  .desc-cell {
    max-width: 300px; color: var(--text-light); font-size: 12px;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-evidence { background: #fff4ce; color: #835c00; }
  .badge-development { background: #d4edda; color: #155724; }
  .badge-triage { background: #e2e3f3; color: #4a4a8a; }
  .badge-backlog { background: #d6e9f8; color: #004578; }
  .badge-preview { background: #e0f2e9; color: #0b6a0b; }
  .badge-default { background: #f0f0f0; color: #666; }
  
  .priority-badge { font-weight: 700; font-size: 11px; }
  .priority-P0 { color: var(--red); }
  .priority-P1 { color: var(--orange); }
  .priority-P2 { color: var(--gray); }
  
  .source-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .source-CRM { background: #e8d4f0; color: #6b2fa0; }
  .source-CSS { background: #d4e8f0; color: #1a6fa0; }
  
  .id-cell { font-family: 'Consolas', monospace; font-size: 12px; color: var(--text-light); white-space: nowrap; }
  .date-cell { white-space: nowrap; font-size: 12px; color: var(--text-light); }
  .age-cell { font-size: 12px; white-space: nowrap; }
  
  .no-results { text-align: center; padding: 48px; color: var(--text-light); }
  
  .export-btn {
    padding: 8px 16px; background: var(--primary); color: white; border: none;
    border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .export-btn:hover { background: var(--primary-dark); }
  
  @media (max-width: 768px) {
    .header, .stats-bar, .controls, .table-container, .results-info { padding-left: 16px; padding-right: 16px; }
    .stat-card { min-width: 90px; padding: 8px 12px; }
    .stat-card .num { font-size: 22px; }
  }
</style>
</head>

const RAW_DATA = [{"featureRequestId": "5058625", "unifiedFeatureRequestId": "UI-FR-049617", "source": "CSS", "title": "Inline DLP - DLP for Copilot to restrict sensitive data used for web query (egress)", "description": "PM Spec:\u00a0DLP for Copilot - web search.docx Feature Overview:Tenant admin should be able to configure DLP policy to restrict M365 Copilot from sending sensitive info in prompt to web query.  The DLP match should generate events in activity explorer that also provides the sensitive Copilot web query context for tenant admin to review, analyze and take necessary actions on the policy matches.  Avg. E2E P999 latency target is TBD Avg. E2E reliability target is >= 99.9  Partner POCs:Sydney PM:\u00a0@Rishi Girish Sydney Engr:\u00a0@Hari Samrat", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-11-05T07:29:32.133+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 532, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/5058625"}, {"featureRequestId": "4608750", "unifiedFeatureRequestId": "UI-FR-049561", "source": "CSS", "title": "[3S] Exclude content in search to restrict discoverability", "description": "Need a new action for DLP policy copilot - exclude in search results and citation. \"IF your document contains xyz, exclude document from search\". The document won't show up in citation or search results   DRI: Mary David Pasch, Yibing Chen Search and Copilot Sensitive Content Protection.docx", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-05-22T03:46:52.017+00:00", "createdBy": "Mary David Pasch", "featureAgeInDays": 490, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/4608750"}, {"featureRequestId": "5046928", "unifiedFeatureRequestId": "UI-FR-049572", "source": "CSS", "title": "Supports SITs as a condition to prevent copilot processing grounding data", "description": "DLP for Copilot prevent processing based on SITs.docx Adding SITs as conditions\u00a0    Work needed on Purview: update policy creation\u00a0 Work needed on 3S: checking SITs as a predicate from DCS   Customer outcome: admins can define SITs as a new condition to achieve protection action on M365 Copilot, such as prevent Copilot from processing content with these SITs, or remove content with these SITs from Copilot references. This work item focuses on SITs in the grounding data (e.g. relevant files, emails)  Support needed from DCS: without labels, we need the ability to run DCS on the content returned by 3S before Copilot returns search results to user", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-10-31T07:07:29.327+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 481, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/5046928"}, {"featureRequestId": "5046934", "unifiedFeatureRequestId": "UI-FR-049592", "source": "CSS", "title": "Inline DLP - M365 Copilot Prompt based on SIT", "description": "Admin screen by screen:\u00a0[PM Mock] DLP for Copilot - inline keyword-based block.pptx Copilot end user UX:\u00a0DLP responses \u2013 Figma Add flight in DF - EnableCopilotKeywordBlocking (\u00a0https://df.purview.microsoft.com/?flight=EnableCopilotKeywordBlocking) PM Spec: Inline DLP for M365 Copilot.docx Dev Spec: DLP for Copilot keyword-based block - dev design.docx  Feature Overview:Tenant admin should be able to configure DLP policy to block M365 Copilot prompt for the scoped user if prompt contains SIT (prompt can contain SIT in plaintext and/or uploaded file).\u00a0  The DLP match should generate events in activity explorer that also provides the sensitive Copilot prompt context for tenant admin to review, analyze and take necessary actions on the policy matches.  Avg. E2E P999 latency target is TBD. Avg. E2E reliability target is >= 99.9. Milestones:PrPr: Tenant admin can configure DLP policy to block SIT in M365 Copilot prompt's plaintext only for scoped user and is enabled to review, analyze and take necessary actions on the policy matches. Scoped to only BizChat Copilot for PrP.  PuPr:Tenant admin can configure DLP policy to block SIT in M365 Copilot prompt (both plaintext and uploaded files) for scoped user and is enabled to review, analyze and take necessary actions on the policy matches. Supported content types remain scoped to m365 emails and files. To be discussed with copilot team around expanding support for content types and timelines (this will have dependency on PICS/DCS). Scope expands to WXP CoPilot.  GA: Additional to PuPr scope, DLP simulation experience for this scenario would be ideal to have for PuPr and must for GA.  Purview Dependencies: PC API Perf Analysis and Optimization - @Ejike Ofuonye    Partner POCs:Sydney PM: @Rishi Girish Sydney Engr: @Jacob Liu AugLoop PM: @Gabrielle Stadlen AugLoop Engr: @Chaitanya Gogineni\u00a0/ @Suresh Tadisetty", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-10-31T07:08:14.78+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 473, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/5046934"}, {"featureRequestId": "5046931", "unifiedFeatureRequestId": "UI-FR-049588", "source": "CSS", "title": "Block Copilot response based on data sensitivity", "description": "Customer problem: If a user asks \"summarize documents with password\", Copilot could return passwords. This needs to be detected and blocked", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-10-31T07:07:50.063+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 460, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/5046931"}, {"featureRequestId": "5150780", "unifiedFeatureRequestId": "UI-FR-049569", "source": "CSS", "title": "Integration DSPM for AI with custom apps built by customers", "description": "As organizations increasingly adopt generative AI, including custom-built applications, DSPM for AI should expand to provide visibility and governance across these environments. This enhancement enables enterprises to manage data security risks associated with AI apps\u2014whether Microsoft-first-party, third-party, or customer-developed.\u00a0  Custom apps that an organization builds using the Purview SDK should appear within DSPM for AI.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-12-04T17:11:45.697+00:00", "createdBy": "Santosh Daddi", "featureAgeInDays": 432, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/5150780"}, {"featureRequestId": "4970724", "unifiedFeatureRequestId": "UI-FR-049597", "source": "CSS", "title": "Restrict email content from processing based on sensitivity labels in Copilot", "description": "Based on sensitivity labels, emails with matched labels are blocked from copilot processing. This will only apply to emails after 1/1/2025  Public preview: 6/1/2025 GA: 8/1/2025", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2024-10-04T20:00:02.563+00:00", "createdBy": "Yibing Chen", "featureAgeInDays": 427, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/4970724"}, {"featureRequestId": "6051894", "unifiedFeatureRequestId": "UI-FR-049574", "source": "CSS", "title": "DLP - Exclude processing of Copilot m365 grounding data based on SITs", "description": "PM Spec:\u00a0DLP for Copilot prevent\n     processing based on SITs.docx Customer evidence:Actions 605241: GCCH Parity - DLP for M365 Copilot: Restrict Copilot from processing sensitive prompt based on SITs for GCCH", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-08-18T20:21:30.733+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 218, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6051894"}, {"featureRequestId": "5680102", "unifiedFeatureRequestId": "UI-FR-049632", "source": "CSS", "title": "Support \"NOT\" condition operator in DLP for Copilot policy", "description": "Problem: Customers want to only allow Copilot to process files with certain labels, such as \"Public\" labeled files. This is difficult to achieve today since the UX is for defining what labels should Copilot block.\u00a0 Incident-607374417 Details - IcM Incident-699363168 Details - IcM  Description of proposal: Add \"NOT\" operator in DLP condition to support defining exceptions  Spec:  Dependency and owners:", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-04-24T00:17:25.82+00:00", "createdBy": "Yibing Chen", "featureAgeInDays": 207, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/5680102"}, {"featureRequestId": "6051888", "unifiedFeatureRequestId": "UI-FR-049626", "source": "CSS", "title": "Inline DLP - DLP Block for Copilot Response", "description": "Spec:\u00a0 FY26H1 - Response DLP.docx \nBlock Copilot from providing\n     an answer if SITs are found in response, including AI generated documents. Other asks\n     from customers, block QR codes, eng. Code, or scripts. \nCustomer UATs: \nFeedback 600209: Blockers in Copilot Chat\n      implementation DLP - SIT Processing \nFeedback 557327: M365 Copilot Redaction of\n      Confidential PII in transit and at rest - chats transcribed in apps and\n      transcription at rest \u2013 SIT \nFeedback 541098: OCBC Copilot Adoption\n      Blocker - Restrict processing sensitive information types \nFeedback 544758: Option to disable\n      code/script generation in M365 Copilot Chat - SIT Actions 605265: New feature - Prompt Filter to prevent a response to an end user if prompting involved data with a specific sensitivity label. - GCCH", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-08-18T20:16:45.22+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 199, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6051888"}, {"featureRequestId": "6067075", "unifiedFeatureRequestId": "UI-FR-049605", "source": "CSS", "title": "Inline DLP - Deliver explainable DLP blocks in Copilot", "description": "Summary: This feature enables Copilot to provide users with clear, actionable explanations when their requests are blocked by Data Loss Prevention (DLP) policies due to detected Sensitive Information Types (SITs). Instead of a generic denial, Copilot will inform users which SIT categories (e.g., SSN, Credit Card) triggered the block and offer guidance on how to proceed (such as removing sensitive data or contacting an admin). The solution preserves privacy by not exposing actual matched values and allows organizations to customize the level of detail shown to end-users. The goal is to improve user understanding of what is allowed/not allowed so they can use Copilot effectively and not assume that Copilot doesn't work when their prompt is rejected.\u00a0 Spec:\u00a0FY26H1 - Disclose the SITs that are blocked to Copilot end-users.docx", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-08-22T23:04:04.267+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 186, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6067075"}, {"featureRequestId": "6092557", "unifiedFeatureRequestId": "UI-FR-049563", "source": "CSS", "title": "Inline DLP - Custom DLP block message", "description": "Summary:  Copilot is showing text that shouldn't be displayed to end-users since it provides instructions on how to bypass DLP. Based on this ICM ticket:\u00a0Incident-639020328 Details - IcM The customer has requested enhanced control over the text displayed to users when access is blocked by the Data Loss Prevention (DLP) policy in Copilot. Currently, the message shown to users is fixed and highlighted in green in the provided image. The customer desires either a fixed message or the ability to customize this text when creating the DLP rule.    Users see a predefined message when access is blocked by the DLP policy in Copilot, without the ability to customize the text.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-08-29T16:50:40.103+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 179, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6092557"}, {"featureRequestId": "6092574", "unifiedFeatureRequestId": "UI-FR-049625", "source": "CSS", "title": "Labeled drafts in Outlook need to be excluded by in-app Copilot from grounding search honoring the DLP policy", "description": null, "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-08-29T16:59:45.87+00:00", "createdBy": "Yibing Chen", "featureAgeInDays": 155, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6092574"}, {"featureRequestId": "6674823", "unifiedFeatureRequestId": "UI-FR-049586", "source": "CSS", "title": "[DCR] Target specific SharePoint sites with the DLP for Copilot policy", "description": "1 customer requesting the ability to target specific SP sites to block content from Copilot processing. Currently put in backlog\u00a0  Incident-702633214 Details - IcM", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-11-17T19:14:22.463+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 99, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6674823"}, {"featureRequestId": "6661365", "unifiedFeatureRequestId": "UI-FR-049568", "source": "CSS", "title": "WXP honor DLP for Copilot for labeled emails", "description": "Work needed on WXP & AugLoop side to honor DLP for Copilot based on sensitivity labels. Using this feature to track this askCustomer escalations:Incident-703047231 Details - IcM", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2025-11-14T01:09:57.81+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 80, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6661365"}, {"featureRequestId": "6835837", "unifiedFeatureRequestId": "UI-FR-049599", "source": "CSS", "title": "Granular scoping of DLP for Copilot locations (Paid vs Free M365 Copilot & Chat)", "description": "Admins should be able to scope DLP for M365 Copilot policies based on different Copilots - Copilot Chat free, Copilot paid  DLP for M365 Copilot - Granular location scoping .docx", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2026-01-06T19:30:39.517+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 41, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6835837"}, {"featureRequestId": "7265234", "unifiedFeatureRequestId": "UI-FR-049578", "source": "CSS", "title": "[DCR] Enhance Copilot DLP Alert Metadata to Include Sensitivity Label SIT details, Device, and Access Platform", "description": "Customer: LSEG. DCR from ICM:\u00a0Incident-51000000962148 Details - IcM  The customer\u00a0has implemented\u00a0Microsoft 365 Copilot\u2013scoped DLP policies\u00a0to prevent Copilot from accessing sensitive content as part of their Copilot adoption strategy. While the DLP policy enforcement is functioning as expected (alerts are generated and Copilot actions are restricted), the\u00a0alert metadata available in DLP Alerts and DLP Activity Explorer is currently insufficient for effective investigation and triage.\u00a0 Specifically, Copilot DLP alerts do not include key metadata such as: Sensitivity Label applied to the content Device information Platform used to access Copilot (e.g. browser, Copilot app, Office applications)   The customer has confirmed that this metadata is available in Insider Risk Management (IRM) Activity Explorer, but not surfaced in DLP Alerts or DLP Activity Explorer, creating a fragmented investigation experience for compliance and DLP analysts. Business Impact The issue affects all users in the organisation (approximately 44,000 users), as Copilot usage and DLP alert generation occur continuously. While end users are not directly impacted, DLP and compliance administrators are significantly affected, as they cannot efficiently analyse or prioritise the high volume of Copilot DLP alerts due to missing context. Analysts are currently required to pivot to IRM (only when an IRM alert exists for the same activity) to retrieve the missing metadata, which is not a reliable or scalable workaround and introduces investigation delays and operational inefficiencies. The customer expects DLP analysts to be able to fully investigate Copilot-related DLP alerts within the DLP solution itself, without dependency on IRM alerts being triggered.   Customer Request The customer is requesting a design enhancement to: Expose additional metadata in Copilot DLP alerts and DLP Activity Explorer, specifically:Sensitivity Label Senstive Info Type Device information Copilot access platform (browser, Copilot app, Office apps, etc.)     Improve the overall Copilot DLP investigation experience to support enterprise\u2011scale adoption and governance.BIS available in DTM:\u00a02603240030007652 - Copilot DLP policy - Metadata is not captured - Business Impact Statement.docx", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2026-04-16T16:33:21.507+00:00", "createdBy": "Sanchita Srivastava", "featureAgeInDays": 4, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/7265234"}, {"featureRequestId": "6854405", "unifiedFeatureRequestId": "UI-FR-049581", "source": "CSS", "title": "Adding audit as an action to DLP for Copilot", "description": "Today, only \"block\" is available in DLP for Copilot location as the action. Customers want a less restrictive option than block, which is \"audit\" as a supported action as well. The outcome is that admin can get alerts about DLP matches, but users won't be blocked", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2026-01-12T18:25:31.3+00:00", "createdBy": "Ankul Garg", "featureAgeInDays": 1, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/6854405"}, {"featureRequestId": "7265396", "unifiedFeatureRequestId": "UI-FR-049573", "source": "CSS", "title": "[DCR] Audit support for DLP policies applied to Copilot", "description": "Customer: Fidelity ICM:\u00a0Incident-21000000979336 Details - IcMSummary: Need option to add audit only, along with block while creating rule.Issue description: \u00a0 Customer is setting up a policy the following way:    Customer wants to know the timeline / feasibility about the Audit feature. \u00a0\u00a0 If the option restrict copilot from processing content will get additional options besides block like audit at some point in the roadmap I understand that simulation mode is intended to provide a comparable outcome; however, simulation policies are time-bound and expire after a defined period, which makes them unsuitable as a long-term or production-ready control for our use case. If there is a formal process to provide additional business justification to help with prioritization, please let me know and I will be happy to proceed.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Development", "priority": null, "createdDate": "2026-04-16T17:11:18.1+00:00", "createdBy": "Sanchita Srivastava", "featureAgeInDays": 0, "url": "https://o365exchange.visualstudio.com/IP%20Engineering/_workitems/edit/7265396"}, {"featureRequestId": "MFR-M365-36225", "unifiedFeatureRequestId": "UI-FR-049402", "source": "CRM", "title": "Scope DSPM for AI Collection Policies to Include or Exclude Specific SITs", "description": "Customers need the ability to Capture Content by select/exclude specific SITs in the collection policies to reduce noise and unwanted SITs detections for Enterprise AI Apps and Copilot Experiences", "featureCategory": "Policy", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P0", "createdDate": "2025-11-20T00:00:00+00:00", "createdBy": "Shivani Mahapatro", "featureAgeInDays": 99, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=e47b340e-dac5-f011-bbd3-7c1e5246ae99"}, {"featureRequestId": "MFR-M365-36941", "unifiedFeatureRequestId": "UI-FR-049500", "source": "CRM", "title": "M365 | DLM: Prevent auto-labelling of shared cloud attachments in Copilot prompt and responses", "description": "Customer who make use of automatic retention label policies to capture and preserve the version shared of modern attachments in Teams, Email and Viva Engage communications require an ability to supress this policy from applying to cloud attachments shared in Copilot prompts and responses.Details on this policy type can be found here:Automatically apply a retention label to Microsoft 365 items | Microsoft Learn Currently any referenced file in a copilot response which is located in SPO triggers the policy and a copy of the file at time of share is stored in the sites Preservation Hold Library.It is common for organisations to classify Copilot interactions as not being considered electronic communications (which would require a version at time of share to be preserved). For these organisations, Copilot interactions typically have a shorter retention period and are proactively deleted and treated differently to electronic communications (such as Teams and email).", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P0", "createdDate": "2026-01-27T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 58, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=224c4942-a6fb-f011-8406-6045bda73be3"}, {"featureRequestId": "MFR-M365-36927", "unifiedFeatureRequestId": "UI-FR-049467", "source": "CRM", "title": "M365 | Detection and prevention (DLP) of Base64\u2011encoded data exfiltration using DLP controls", "description": "Detection and prevention (DLP) of Base64\u2011encoded data exfiltration using DLP controls for M365 Copilot", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P0", "createdDate": "2026-01-27T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 58, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=62a83e4c-6efb-f011-8407-7c1e52157f83"}, {"featureRequestId": "MFR-M365-35825", "unifiedFeatureRequestId": "UI-FR-049475", "source": "CRM", "title": "Surface attempts to jailbreak Copilot or its agents in DSPM for AI.", "description": "Nestle\u2019s request to surface attempts to jailbreak Copilot or its agents in DSPM for AI's activity explorer.Reasoning: Untracked unethical behavior poses significant security and compliance risks. Without visibility into these attempts, organizations cannot respond to threats or enforce ethical use. It\u2019s important for them to have visibility of Jailbreak attempts in DSPM for AI. They have also tried using CC policies but it generates too many false positives.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P0", "createdDate": "2025-10-10T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 0, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=99cbfdc2-e1a5-f011-bbd3-7c1e526b516b"}, {"featureRequestId": "MFR-M365-38628", "unifiedFeatureRequestId": "UI-FR-049445", "source": "CRM", "title": "Purview for A365 | Friendly Agent Name Resolution in Activity Explorer", "description": "Problem Statement:Activity Explorer should resolve agent GUIDs to human-readable names to improve triage speed and reduce operational friction.https://teams.microsoft.com/l/meeting/details?eventId=AAMkADZmMTBiYTIwLTRmMDMtNDRmMS1iNDk3LWMyZjQ3YWI3NDJlNwBGAAAAAABA56OEpBCRRZ0XZ_EDnlJHBwAXGWKzR8oOSoZ-MdjDd7I-AAAAxthfAABaU2fARRpJSobm_5lgSCd0AAfiH6P0AAA%3d", "featureCategory": "A365", "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P1", "createdDate": "2026-04-09T00:00:00+00:00", "createdBy": "Min Zhou", "featureAgeInDays": 8, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=8dc3a875-0b34-f111-88b5-7c1e52817b02"}, {"featureRequestId": "MFR-M365-28721", "unifiedFeatureRequestId": "UI-FR-049466", "source": "CRM", "title": "M365 | DLM: Distinguish Copilot session title and prompt history to avoid confusion", "description": "Scenario: Customers misunderstand that the Copilot user prompts are not being deleted along with the chat history by retention policies. This is due to the fact that by default the session title is based on the initial prompt submitted by the user (up to a certain character limit) and so it appears that it is in fact the user prompt. This causes customers to believe the prompt history is being retained beyond the applicable policy timing. Currently, copilot interactions are saved like Teams messages, and Teams messages are stored like emails with a body and a subject line. Because there are no subject lines in copilot interactions, the initial message is used as the \"subject\" (prompt title) for all the messages within the conversation when they are stored. Therefore, if there are still messages that have not reached the end of its retention period (for conversations that span multiple days), the conversation thread will continue to exist, and continue to display the initial message as its \"subject\" name in Teams. Only when all the messages from that copilot interaction are deleted, will the whole conversation thread disappear, and so will the \"subject\" or prompt title from the user interface in Teams. The feedback and recommendation to the Substrate/IC3 team (MW), is to generate a conversation title (prompt title) that's not the content of the first message, in order to avoid confusion for our customers seeing their first message even when it's been deleted by a retention policy. Impact: Blocker due to misunderstanding Evidence: 1", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2024-01-09T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 807, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=038a5d0b-8685-4b95-b637-2d6742dd26ad"}, {"featureRequestId": "MFR-M365-29303", "unifiedFeatureRequestId": "UI-FR-049441", "source": "CRM", "title": "M365 | When Teams DLP blocks a message, P4AI should not provide a response to that message", "description": "When Teams DLP blocks a message because it contains sensitive data, users can still probe the data by asking Copilot, e.g. \"is there an SSN ending in 7180 in that last message?\" or \"did the diagnostic mentioned in the last message include Covid?\". It's important to highlight that this is not about blocking the conversation with Copilot with DLP (different feature) since the prompt and response might not themselves have PII, but about ensuring that what was enforced for DLP doesn't have a loophole through Copilot prompting.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2024-02-22T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 763, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=2a036551-0945-4835-9747-eee0436abd3c"}, {"featureRequestId": "MFR-M365-30407", "unifiedFeatureRequestId": "UI-FR-049410", "source": "CRM", "title": "M365 | DLP for copilot interactions based on SITs", "description": "Ability to prevents user to submit Copilot prompts in Microsoft 365 Apps if: - The prompt contain specific / sensitive info- The request is related to specific / sensitive info contained in the document. eg : - prompt : create a text for <Sensitive info>- summarize <Doc with sensitive info> Goals are to prevent potential end-user abuse of the service and sensitive \"data in use\" to be processed in Copilot framework", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Preview Release", "priority": "P2", "createdDate": "2024-04-04T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 721, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=e16b27da-c55f-4278-b995-62bfe104add1"}, {"featureRequestId": "MFR-M365-33576", "unifiedFeatureRequestId": "UI-FR-049405", "source": "CRM", "title": "M365 | Simulation mode for DLP for M365 Copilot", "description": null, "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Preview Release", "priority": "P2", "createdDate": "2025-02-20T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 399, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=f8173abf-ddef-ef11-be20-6045bddbf891"}, {"featureRequestId": "MFR-M365-34544", "unifiedFeatureRequestId": "UI-FR-049501", "source": "CRM", "title": "M365 | DLP for Copilot - PDF/Filetype support not mentioned in any documentation", "description": "Update the public documentation to list filetype support for this feature. It is called out specifically on the NDA roadmap slide deck, but that is the only place I have been able to find that information.Link to NDA roadmap: Data Security NDA roadmap on slide 8:\"DLP: Extension of DLP controls to M365 Copilot, starting with policy conditions to prevent processing of Office files & PDFs in SharePoint with a sensitivity label applied\"No where in our public documentation or internal wiki docs do we mention PDF or filetype support for DLP for CoPilot. Internal resources we checked and didn't find this information:Copilot DLP (internal) wiki - Copilot for Microsoft 365 and Purview Compliance - OverviewFAQ - FAQ - OverviewPublic documentation that did not have this information and needs to be updated:Learn about the Microsoft 365 Copilot location (preview) | Microsoft LearnI could only find one mention of it in the NDA roadmap (thanks to Sophie):Data Security NDA roadmap", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": null, "priority": "P2", "createdDate": "2025-05-14T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 316, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=ec8b4ccf-0131-f011-8c4e-7c1e524627f8"}, {"featureRequestId": "MFR-M365-35068", "unifiedFeatureRequestId": "UI-FR-049508", "source": "CRM", "title": "M365 | Restrict Copilot Access in GCC via Sensitivity Labels and DLP Polices", "description": "Customer is concerned about data protection and oversharing and ensuring that sensitive data can be isolated from Copilot in the most efficient manner possible. The customer would like to use Microsoft Purview Sensitivity Labels in conjunction with Data Loss Prevention (DLP) policies in GCC to prevent Microsoft Copilot from accessing or retrieving data that is protected by these labels and policies. Their goal is to ensure that Copilot cannot search or surface content that has been classified and restricted under these compliance controls.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-07-15T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 254, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=7b0c9b6c-9261-f011-bec1-6045bdffdb47"}, {"featureRequestId": "MFR-M365-35290", "unifiedFeatureRequestId": "UI-FR-049417", "source": "CRM", "title": "M365 | Copilot Prompt DLP - Extend to On-Prem Labeled Data", "description": "They would be able to specify labels that are extended to on-premises documents to prevent any interaction with copilot whether it is embedded (word, excel, power point) or uploaded to chat functionality. Performing similar to cloud saved documents (ODfb/SPO). A UK Consultancy Company that has contracts with export controls and official sensitive information handling standards requiring certain data to remain on-premise due to various regulations has enabled Copilot Prompt DLP and verified it does work for online file types but when using native embedded experiences does not block copilot prompt interaction.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Preview Release", "priority": "P2", "createdDate": "2025-08-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 231, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=0e509eb9-ee76-f011-b4cc-7ced8d17c5da"}, {"featureRequestId": "MFR-M365-35488", "unifiedFeatureRequestId": "UI-FR-049440", "source": "CRM", "title": "M365 | Redact SITs from Copilot response", "description": "First step was blocking based on label on referenced file, then prompt DLP based on SITs in the prompt. Customers are now asking for SITs to be redacted in the response so end users aren't returned SITs.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2025-09-04T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 229, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=c20000ae-9889-f011-b4cc-7c1e5246a79a"}, {"featureRequestId": "MFR-M365-35284", "unifiedFeatureRequestId": "UI-FR-049454", "source": "CRM", "title": "M365 | Outlook Copilot enforcement of restricted sensitivity labels for email summarization", "description": "Outlook honors the sensitivity label set for 'prevent processing' inside DLP for M365 Copilot rule that is enabledEmail is a common tool used for data exfiltration attempts Customer is using DLP for M365 Copilot and noticed that emails labeled with restricted sensitivity labels are still able to be summarized, this is concerning to them as they deploy M365 Copilot", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2025-08-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 227, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=b3ab9f80-eb76-f011-b4cc-7ced8d17c5da"}, {"featureRequestId": "MFR-M365-35278", "unifiedFeatureRequestId": "UI-FR-049539", "source": "CRM", "title": "M365 | Expand DSPM for AI recommendations to cover Communication Compliance for Copilot interactions", "description": "Include CC policy \"Microsoft 365 Copilot Interactions\" as part of DSPM for AI recommendations. Discussed this with Sophie Ke already.DSPM for AI recommends a number of AI related policies across Purview, including one for Communication Compliance \"Detect unethical behavior in AI apps\" but it doesn't include what I believe to be the most relevant CC policy \"Microsoft 365 Copilot Interactions\" which targets Copilot Experiences, using the Azure AI classifiers Prompt Shields, Protected material and to detect risky usage of Copilot.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2025-08-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 227, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=853680a3-e476-f011-b4cc-7ced8d17c5da"}, {"featureRequestId": "MFR-M365-35335", "unifiedFeatureRequestId": "UI-FR-049413", "source": "CRM", "title": "M365 Copilot | Clear Differentiation Needed for Copilot Activities in Purview Audit", "description": "Clarify the different activities related to Copilot (Microsoft Copilot Chat , Microsoft 365 Copilot ) There is a lot of unclarity when customer want to select Copilot activities when creating an Audit request. The tool is unpractical and nearly useless. See included picture.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2025-08-18T00:00:00+00:00", "cr riority": "P2", "createdDate": "2025-09-23T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 184, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=26a0c317-c898-f011-b41c-6045bdffdb47"}, {"featureRequestId": "MFR-M365-35840", "unifiedFeatureRequestId": "UI-FR-049536", "source": "CRM", "title": "M365 | Pre-trained ML classifier to detect data-hunting behavior in AI apps", "description": "Pre-trained ML classifier that identifies when a user is attempting to hunt for sensitive data in AI apps. The classifier should detect intent in queries such as: \u201cwhat sensitive information can I access\", \u201cshow me all files marked confidential\u201d, \u201clist documents with financial data\u201d. Customer could then set up IRM/CC policies to flag these kinds of queries or trigger DLP policy-based actions.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-10-14T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 163, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=832e3355-00a9-f011-bbd3-6045bdd4220a"}, {"featureRequestId": "MFR-M365-36228", "unifiedFeatureRequestId": "UI-FR-049509", "source": "CRM", "title": "GitHub Copilot support for DSPM for AI", "description": "Support GitHub Copilot in Purview for AI.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-11-20T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 147, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=090cc150-3dc6-f011-bbd3 hat it has access to and if it is published to too many people. They do not want the publish/unpublish duties to just be on the IT admin.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-11-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 139, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=6238495a-3cbf-f011-bbd3-7c1e520d7246"}, {"featureRequestId": "MFR-M365-36135", "unifiedFeatureRequestId": "UI-FR-049460", "source": "CRM", "title": "Purview for A365 | Agent Knowledge Source Visibility", "description": "Customers would like visibility into the agents\u2019 knowledge sources to determine if the agent has access to excessive sensitive data in relation to the users authorized to interact with them. Our understanding is that this will be added into agent observability, but we have not been able to test to confirm the details of the capability.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "In Engineering Backlog", "priority": "P2", "createdDate": "2025-11-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 139, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=5194dc30-3bbf-f011-bbd3-7c1e520d7246"}, {"featureRequestId": "MFR-M365-36133", "unifiedFeatureRequestId": "UI-FR-049496", "source": "CRM", "title": "M365 | Visibility into Copilot Interaction Themes", "description": "Visibility into themes of Copilot conversations within DSPM for AI reports and Activity Explorer. Specifically, they want categorization of actions such as summarization, research queries, or non-work-related prompts. This insight would help organizations measure Copilot adoption, inform license extension decisions, and apply appropriate restrictions. Leadership views this as critical for understanding usage patterns and driving governance.", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-11-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 135, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=ae34d661-36bf-f011-bbd3-7c1e520d7246"}, {"featureRequestId": "MFR-M365-36131", "unifiedFeatureRequestId": "UI-FR-049422", "source": "CRM", "title": "Extend Browser DLP Support to Chrome", "description": "Extend Browser inline DLP support to Chrome", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-11-11T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 134, "url": "https://m365crm.crm.dynamics.com/main.aspx?appid=bf381023-a1eb-42ad-b3f5-4ad6a41655fc&pagetype=entityrecord&etn=ems_productfeature&id=a0cb4a67-32bf-f011-bbd3-7c1e520d7246"}, {"featureRequestId": "MFR-M365-36265", "unifiedFeatureRequestId": "UI-FR-049426", "source": "CRM", "title": "Data risk assessments: finer grained controls for what is overshared", "description": "Customers want finer grained controls for defining what is overshared. For example documents with SITs showing up a certain number of times are shared with X number of users. Zscaler offer this capability (fine-grained, condition-based detection).", "featureCategory": null, "productId": 94, "productName": "Purview for AI", "productFamily": "Microsoft Purview", "customerFacingStatus": "Evidence Gathering", "priority": "P2", "createdDate": "2025-11-26T00:00:00+00:00", "createdBy": null, "featureAgeInDays": 120
